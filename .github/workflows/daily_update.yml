name: Auto Update VPN Nodes

on:
  schedule:
    # 北京时间每天早上 9 点运行 (UTC 时间 1 点)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动点击按钮运行

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run update script
        run: |
          python .github/scripts/update_links.py

      - name: Force Update Timestamp for SEO
        run: |
          sed -i '//d' README.md
          
          CURRENT_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S")
          echo "" >> README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add README.md
            git commit -m "🚀 Auto Update: Verified VPN nodes list [$(TZ="Asia/Shanghai" date +'%Y-%m-%d')]"
            git push
            echo "Changes pushed successfully."
          else
            echo "No changes to commit."
          fi
